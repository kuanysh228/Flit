name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build — ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf flit-${{ github.ref_name }}-${{ matrix.target }}.tar.gz flit
          mv flit-*.tar.gz ../../../

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path flit.exe -DestinationPath "../../../flit-${{ github.ref_name }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: flit-${{ matrix.target }}
          path: flit-*.${{ matrix.archive }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: flit-*
          generate_release_notes: true
          body: |
            ## Flit ${{ github.ref_name }}

            Modern RSVP terminal reader. Single binary, no dependencies.

            ### Install

            Download the binary for your platform below, extract and run:

            ```bash
            tar xzf flit-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            ./flit --help
            ```

            Or build from source:
            ```bash
            cargo install flit
            ```

            ### Platforms

            | File | Platform |
            |------|----------|
            | `flit-*-x86_64-unknown-linux-gnu.tar.gz` | Linux x86_64 (glibc) |
            | `flit-*-x86_64-unknown-linux-musl.tar.gz` | Linux x86_64 (static musl) |
            | `flit-*-aarch64-unknown-linux-gnu.tar.gz` | Linux ARM64 |
            | `flit-*-x86_64-apple-darwin.tar.gz` | macOS Intel |
            | `flit-*-aarch64-apple-darwin.tar.gz` | macOS Apple Silicon |
            | `flit-*-x86_64-pc-windows-msvc.zip` | Windows x86_64 |
